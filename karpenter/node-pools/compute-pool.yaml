# Compute-optimised NodePool
# c5/c6i/c6a — high CPU-to-memory ratio
# Used by: CPU-intensive batch jobs, data processing
# Tainted — only pods that explicitly tolerate can schedule here
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: compute-optimized
  annotations:
    description: "CPU-heavy workloads — c5/c6i family, spot preferred"
spec:
  template:
    metadata:
      labels:
        nodepool: compute-optimized
        node-type: compute
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["4", "8", "16", "32", "64"]

      taints:
        - key: workload-type
          value: compute
          effect: NoSchedule

      kubelet:
        maxPods: 110

  limits:
    cpu: "300"
    memory: "600Gi"

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    budgets:
      - nodes: "20%"
