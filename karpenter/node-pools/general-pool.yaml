# General-purpose NodePool
# Mixed Spot + On-Demand, m5/m6i/m6a family
# Used by: most application workloads
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
  annotations:
    description: "General workloads — Spot preferred, On-Demand fallback"
spec:
  template:
    metadata:
      labels:
        nodepool: general
        node-type: mixed
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        - key: kubernetes.io/os
          operator: In
          values: ["linux"]

        # Spot first, On-Demand as fallback
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]

        # m5, m6i, m6a — balanced CPU/memory
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["m"]

        # Generation 5+ only (newer, better price/perf)
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]

        # Min 2 vCPUs, max 32 vCPUs per node
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["2", "4", "8", "16", "32"]

        # Avoid burstable instances for consistent latency
        - key: karpenter.k8s.aws/instance-hypervisor
          operator: In
          values: ["nitro"]

      # Startup taint — removed when node is ready
      # Prevents pods scheduling before node init completes
      taints: []

      # Kubelet config per-node
      kubelet:
        maxPods: 110
        systemReserved:
          cpu: "100m"
          memory: "200Mi"
        kubeReserved:
          cpu: "100m"
          memory: "300Mi"

  # Cluster-wide limits for this NodePool
  limits:
    cpu: "500"         # 500 vCPUs max across all general nodes
    memory: "1000Gi"   # 1 TB RAM max

  disruption:
    # WhenEmptyOrUnderutilized — consolidate idle/underutilised nodes
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s

    # Don't disrupt during business hours (IST 9am-6pm = UTC 3:30am-12:30pm)
    budgets:
      - nodes: "10%"    # Max 10% of nodes disrupted at once (always)
      - schedule: "30 3 * * 1-5"   # Mon–Fri 9am IST
        duration: 9h
        nodes: "0"      # No disruptions during business hours in prod
