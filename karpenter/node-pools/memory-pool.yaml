# Memory-optimised NodePool
# r5/r6i — high memory-to-CPU ratio
# Used by: in-memory caches, JVM heaps, ML model serving
# On-Demand ONLY — memory workloads shouldn't be interrupted
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: memory-optimized
  annotations:
    description: "Memory-heavy workloads — r5/r6i, On-Demand only"
spec:
  template:
    metadata:
      labels:
        nodepool: memory-optimized
        node-type: memory
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]     # On-Demand only — no spot interruptions
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]

      taints:
        - key: workload-type
          value: memory
          effect: NoSchedule

  limits:
    cpu: "200"
    memory: "2000Gi"

  disruption:
    consolidationPolicy: WhenEmpty     # Only consolidate fully empty nodes
    consolidateAfter: 5m
    budgets:
      - nodes: "5%"    # Very conservative — memory workloads are stateful
